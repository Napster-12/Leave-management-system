<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
/* ================= MODERN UNIVERSITY PORTAL DESIGN ================= */

:root {
    --primary: #0b2e59;
    --accent: #f4b400;
    --light-bg: #f4f6f9;
    --text-dark: #1f2937;
    --text-muted: #6b7280;
}

body {
    background: var(--light-bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
}

.card {
    max-width: 500px;
    width: 100%;
    background: #ffffff;
    border-radius: 14px;
    padding: 60px 45px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    position: relative;
    text-align: center;
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(to right, var(--primary), var(--accent));
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
}

.logo {
    width: 170px;
    height: auto;
    margin-bottom: 25px;
}

h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 15px;
}

p {
    color: var(--text-muted);
    margin-bottom: 40px;
    font-size: 1.05rem;
}

/* Buttons */
.btn {
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    transition: all 0.25s ease;
}

.btn-primary {
    background-color: var(--primary);
    border: none;
}

.btn-primary:hover {
    background-color: #081f3f;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(11, 46, 89, 0.25);
}

.btn-outline-primary {
    border: 2px solid var(--primary);
    color: var(--primary);
}

.btn-outline-primary:hover {
    background-color: var(--primary);
    color: #ffffff;
    transform: translateY(-2px);
}

/* Button spacing */
.d-grid {
    gap: 18px;
}

@media (max-width: 576px) {
    .card {
        padding: 45px 25px;
    }

    h1 {
        font-size: 1.6rem;
    }

    .logo {
        width: 140px;
    }
}
    </style>
</head>
<body>

<div class="card">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">

    <!-- Title -->
    <h1>Leave Management System</h1>

    <!-- Subtitle -->
    <p>
        Manage leave requests efficiently and securely through the official staff portal.
    </p>

    <!-- Buttons -->
    <div class="d-grid">
        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg">Login</a>
        <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-lg">Create Account</a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
