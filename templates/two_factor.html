<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Two-Factor Verification - Leave Management System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
/* ================= MODERN UNIVERSITY PORTAL DESIGN ================= */

:root {
    --primary: #0b2e59;
    --accent: #f4b400;
    --light-bg: #f4f6f9;
    --text-dark: #1f2937;
    --text-muted: #6b7280;
}

body {
    background: var(--light-bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
}

.card {
    max-width: 480px;
    width: 100%;
    background: #ffffff;
    border-radius: 14px;
    padding: 55px 45px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    position: relative;
    text-align: center;
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(to right, var(--primary), var(--accent));
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
}

h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 15px;
}

p {
    color: var(--text-muted);
    margin-bottom: 25px;
    font-size: 1rem;
}

/* OTP Input Styling */
.form-control {
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    text-align: center;
    font-size: 1.4rem;
    letter-spacing: 6px;
    transition: all 0.2s ease;
}

.form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(11, 46, 89, 0.1);
}

/* Button */
.btn {
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    transition: all 0.25s ease;
}

.btn-primary {
    background-color: var(--primary);
    border: none;
}

.btn-primary:hover {
    background-color: #081f3f;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(11, 46, 89, 0.25);
}

/* Alert */
.alert {
    margin-bottom: 20px;
}

@media (max-width: 576px) {
    .card {
        padding: 40px 25px;
    }

    h1 {
        font-size: 1.5rem;
    }
}
    </style>
</head>
<body>

<div class="card">

    <!-- Title -->
    <h1>Two-Factor Verification</h1>
    <p>Hello {{ name }}, please enter your 6-digit authentication code.</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-danger">
                {% for msg in messages %}
                    {{ msg }}
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <!-- 2FA Form -->
    <form method="POST">

        <div class="mb-4">
            <input 
                type="text" 
                name="token" 
                class="form-control" 
                placeholder="••••••" 
                maxlength="6"
                pattern="[0-9]{6}"
                inputmode="numeric"
                required>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary btn-lg">Verify Code</button>
        </div>

    </form>

</div>

</body>
</html>
