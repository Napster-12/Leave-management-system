<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set Up 2FA - Leave Management System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
/* ================= MODERN UNIVERSITY PORTAL DESIGN ================= */

:root {
    --primary: #0b2e59;
    --accent: #f4b400;
    --light-bg: #f4f6f9;
    --text-dark: #1f2937;
    --text-muted: #6b7280;
}

body {
    background: var(--light-bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
}

.card {
    max-width: 480px;
    width: 100%;
    background: #ffffff;
    border-radius: 14px;
    padding: 55px 45px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    position: relative;
    text-align: center;
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(to right, var(--primary), var(--accent));
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
}

.logo {
    width: 160px;
    height: auto;
    margin-bottom: 25px;
}

h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 10px;
}

p {
    color: var(--text-muted);
    font-size: 1rem;
    margin-bottom: 25px;
}

/* QR Code Box */
.qr-code {
    background: #f9fafb;
    padding: 20px;
    border-radius: 12px;
    display: inline-block;
    margin-bottom: 30px;
    border: 1px solid #e5e7eb;
}

.qr-code img {
    width: 200px;
    height: auto;
}

/* Button */
.btn {
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    transition: all 0.25s ease;
}

.btn-primary {
    background-color: var(--primary);
    border: none;
}

.btn-primary:hover {
    background-color: #081f3f;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(11, 46, 89, 0.25);
}

@media (max-width: 576px) {
    .card {
        padding: 40px 25px;
    }

    h1 {
        font-size: 1.5rem;
    }

    .logo {
        width: 130px;
    }

    .qr-code img {
        width: 170px;
    }
}
    </style>
</head>
<body>

<div class="card">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">

    <!-- Greeting -->
    <h1>Hello {{ name }}</h1>
    <p>
        Scan the QR code below using Google Authenticator or any compatible TOTP authentication app.
    </p>

    <!-- QR Code -->
    <div class="qr-code">
        <img src="data:image/png;base64,{{ qr_code_b64 }}" alt="QR Code">
    </div>

    <!-- Continue Button -->
    <form method="GET" action="{{ url_for('two_factor') }}">
        <div class="d-grid">
            <button class="btn btn-primary btn-lg">
                Continue to Verification
            </button>
        </div>
    </form>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
