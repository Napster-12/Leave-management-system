<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Leave Management System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
/* ================= MODERN UNIVERSITY PORTAL DESIGN ================= */

:root {
    --primary: #0b2e59;
    --accent: #f4b400;
    --light-bg: #f4f6f9;
    --text-dark: #1f2937;
    --text-muted: #6b7280;
}

body {
    background: var(--light-bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
}

.card {
    max-width: 480px;
    width: 100%;
    background: #ffffff;
    border-radius: 14px;
    padding: 55px 45px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    position: relative;
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(to right, var(--primary), var(--accent));
    border-top-left-radius: 14px;
    border-top-right-radius: 14px;
}

.logo {
    width: 170px;
    height: auto;
    display: block;
    margin: 0 auto 25px auto;
}

h1 {
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 25px;
    text-align: center;
}

/* Form Styling */
form .form-group {
    margin-bottom: 22px;
    text-align: left;
}

form label {
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text-dark);
    display: block;
}

.form-control,
.form-select {
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    transition: all 0.2s ease;
}

.form-control:focus,
.form-select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(11, 46, 89, 0.1);
}

.btn {
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    transition: all 0.25s ease;
}

.btn-primary {
    background-color: var(--primary);
    border: none;
}

.btn-primary:hover {
    background-color: #081f3f;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(11, 46, 89, 0.25);
}

/* Link Styling */
.text-link {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
}

.text-link:hover {
    text-decoration: underline;
}

/* Alert spacing */
.alert {
    margin-bottom: 20px;
}

@media (max-width: 576px) {
    .card {
        padding: 40px 25px;
    }

    h1 {
        font-size: 1.6rem;
    }

    .logo {
        width: 140px;
    }
}
    </style>
</head>
<body>

<div class="card">
    
    <!-- Logo -->
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">

    <!-- Title -->
    <h1>Create Account</h1>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-danger" role="alert">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Registration Form -->
    <form method="POST">

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" name="password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
            <label for="role">Select Role</label>
            <select id="role" class="form-select" name="role" required>
                <option value="">Choose a role</option>
                <option value="employee">Employee</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Register</button>
        </div>

    </form>

    <!-- Login link -->
    <p class="mt-4 text-center">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-link">Login</a>
    </p>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
